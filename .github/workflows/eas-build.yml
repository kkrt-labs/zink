# .github/workflows/local-eas-build.yml

name: Local EAS Build PR Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  android_build:
    name: Android Local Build (Preview)
    runs-on: linux-arm-medium

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Project Dependencies
        run: npm ci

      - name: Run EAS Local Android Build (Preview Profile)
        # eas build --local will automatically trigger your eas-build-pre-install
        # and eas-build-post-install hooks defined in package.json.
        # It will handle Rust tool installation and bindings generation.
        run: eas build --local --platform android --profile preview --non-interactive

      - name: Indicate Android Build Success
        run: echo "✅ Android local build successful!"

  ios_simulator_build:
    name: iOS Simulator Local Build (Preview)
    runs-on: linux-arm-medium

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Project Dependencies
        run: npm ci

      - name: Run EAS Local iOS Build (Preview Profile)
        run: eas build --local --platform ios --profile preview --non-interactive

      - name: Indicate iOS Build Success
        run: echo "✅ iOS (device) local build successful!"
