
# For aarch64-linux-android (ARM64)
[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang" # NDK toolchain Clang wrapper
ar = "llvm-ar"                           # NDK archiver

# For armv7-linux-androideabi (ARMv7)
[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi21-clang"
ar = "llvm-ar"

# For i686-linux-android (x86)
[target.i686-linux-android]
linker = "i686-linux-android21-clang"
ar = "llvm-ar"

# For x86_64-linux-android (x86_64)
[target.x86_64-linux-android]
linker = "x86_64-linux-android21-clang"
ar = "llvm-ar"
